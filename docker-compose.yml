version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6-alpine
    container_name: ums-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: user-management-system
    volumes:
      - mongodb_data:/data/db
    networks:
      - ums-network

  # Backend API
  backend:
    build: ./backend
    container_name: ums-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/user-management-system?authSource=admin
      JWT_SECRET: your_super_secret_jwt_key_change_this_in_production
      JWT_REFRESH_SECRET: your_super_secret_refresh_key_change_this_in_production
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - ums-network
    restart: unless-stopped

  # Frontend React App
  frontend:
    build: ./frontend
    container_name: ums-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - ums-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  ums-network:
    driver: bridge
